name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build patcher (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: yunyun-faithful-english-patch-linux
            add_data: translations:translations
          - os: macos-latest
            artifact: yunyun-faithful-english-patch-macos
            add_data: translations:translations
          - os: windows-latest
            artifact: yunyun-faithful-english-patch-windows
            add_data: translations;translations

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Check before build
        run: |
          python -m ruff check src
          python - <<'PY'
          from pathlib import Path
          import sys

          banned_suffixes = {
              ".asset", ".assets", ".bundle", ".dll", ".exe", ".jpeg", ".jpg",
              ".meta", ".mp3", ".mp4", ".msi", ".ogg", ".pdf", ".png",
              ".prefab", ".raw.jsonl", ".resS", ".resource", ".unity3d", ".wav",
          }
          banned_magic = {
              b"UnityFS\x00": "UnityFS asset bundle",
              b"MZ": "Windows binary",
              b"%PDF": "PDF",
              b"\x89PNG": "PNG",
              b"OggS": "Ogg media",
          }
          skipped_dirs = {
              ".git", ".mypy_cache", ".pytest_cache", ".ruff_cache", ".venv",
              "__pycache__", "build", "dist", "extracted", "probe", "work",
          }
          failures = []
          root = Path.cwd()
          for path in sorted(root.rglob("*")):
              rel = path.relative_to(root)
              if path.is_dir() or any(part in skipped_dirs for part in rel.parts):
                  continue
              if any(path.name.lower().endswith(suffix) for suffix in banned_suffixes):
                  failures.append(f"{rel}: banned file type")
              with path.open("rb") as handle:
                  head = handle.read(16)
              for magic, label in banned_magic.items():
                  if head.startswith(magic):
                      failures.append(f"{rel}: looks like {label}")
          if failures:
              print("Repository file check failed:", file=sys.stderr)
              print("\n".join(f"  - {failure}" for failure in failures), file=sys.stderr)
              raise SystemExit(1)
          print("Repository file check passed.")
          PY

      - name: Build patcher
        run: >
          python -m PyInstaller
          --onefile
          --name yunyun-faithful-english-patch
          --paths src
          --add-data "${{ matrix.add_data }}"
          src/yunyun_faithful_english_patch/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/yunyun-faithful-english-patch
            dist/yunyun-faithful-english-patch.exe
          if-no-files-found: error
