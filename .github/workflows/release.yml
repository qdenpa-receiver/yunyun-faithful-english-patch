name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build patcher (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: yunyun-faithful-english-patch-linux
            add_data: translations:translations
          - os: macos-latest
            artifact: yunyun-faithful-english-patch-macos
            add_data: translations:translations
          - os: windows-latest
            artifact: yunyun-faithful-english-patch-windows
            add_data: translations;translations

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Check before build
        run: |
          python -m ruff check src .github/check_repository_files.py
          python .github/check_repository_files.py

      - name: Build patcher
        run: >
          python -m PyInstaller
          --onefile
          --name yunyun-faithful-english-patch
          --paths src
          --add-data "${{ matrix.add_data }}"
          src/yunyun_faithful_english_patch/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/yunyun-faithful-english-patch
            dist/yunyun-faithful-english-patch.exe
          if-no-files-found: error
